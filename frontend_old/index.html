<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriAssist AI</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- BoxIcons for icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dark-theme">

    <div class="app-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class='bx bx-leaf'></i> AgriAssist</h2>
                <button id="new-chat-btn" class="btn-primary">
                    <i class='bx bx-plus'></i> New Chat
                </button>
            </div>

            <div class="sidebar-content">
                <div class="history-section">
                    <p class="section-title">Recent Chats</p>
                    <ul id="history-list" class="history-list">
                        <!-- History items will be injected here -->
                    </ul>
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="clear-history-btn" class="btn-secondary danger">
                    <i class='bx bx-trash'></i> Clear History
                </button>
                <div class="user-profile">
                    <div class="avatar">U</div>
                    <div class="user-info">
                        <span class="user-name">User</span>
                        <span class="user-role">Farmer Role</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-content">
            <header class="topbar">
                <button id="toggle-sidebar" class="icon-btn mobile-only">
                    <i class='bx bx-menu'></i>
                </button>
                <div class="topbar-title">AgriAssist AI</div>
                <div class="topbar-actions">
                    <button class="icon-btn" id="theme-toggle" title="Toggle Theme">
                        <i class='bx bx-sun'></i>
                    </button>
                </div>
            </header>

            <div class="chat-container">
                <div id="welcome-screen" class="welcome-screen">
                    <div class="welcome-icon"><i class='bx bx-bot'></i></div>
                    <h1>How can I help you today?</h1>
                    <div class="suggestions-grid">
                        <button class="suggestion-card" data-prompt="How do I detect fertilizer issues?">
                            <i class='bx bx-bug'></i>
                            <span>Detect fertilizer issues</span>
                        </button>
                        <button class="suggestion-card" data-prompt="Can you give me weather info for my farm?">
                            <i class='bx bx-cloud-rain'></i>
                            <span>Check farm weather</span>
                        </button>
                        <button class="suggestion-card" data-prompt="What are some alternative organic fertilizers?">
                            <i class='bx bx-leaf'></i>
                            <span>Organic fertilizers</span>
                        </button>
                        <button class="suggestion-card" data-prompt="Recommend some agriculture tools for plowing.">
                            <i class='bx bx-wrench'></i>
                            <span>Agriculture tools</span>
                        </button>
                    </div>
                </div>

                <div id="chat-messages" class="chat-messages hidden">
                    <!-- Chat bubbles will go here -->
                </div>
            </div>

            <div class="input-area">
                <form id="chat-form" class="chat-form">
                    <div class="input-box">
                        <textarea id="chat-input" placeholder="Message AgriAssist..." rows="1"></textarea>
                        <button type="submit" id="send-btn" class="send-btn" disabled>
                            <i class='bx bx-send'></i>
                        </button>
                    </div>
                    <div class="footer-note">AgriAssist can make mistakes. Consider verifying important information.
                    </div>
                </form>
            </div>
        </main>

    </div>

    <!-- Script -->
    <script src="script.js"></script>
</body>

</html>
